name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/eduardsie/eventhub

permissions:
  contents: read
  packages: write

jobs:
  # ── JOB 1: Build & Push Image ─────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 2: Deploy to EC2 ──────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy seed.sql
        run: |
          if [ -f seed.sql ]; then
            scp -o StrictHostKeyChecking=no seed.sql \
              ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/seed.sql

      - name: Deploy via SSH
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            APP_DIR="/home/ubuntu/app"
            mkdir -p "$APP_DIR"
 
            cat > "$APP_DIR/.env" << 'ENVEOF'
          ${{ secrets.APP_ENV }}
          ENVEOF

            cat > "$APP_DIR/compose.yaml" << 'COMPOSEEOF'
          ${{ vars.COMPOSE_YAML }}
          COMPOSEEOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            cd /home/ubuntu/app

            docker compose pull app

            docker compose up -d --no-deps app

            docker compose exec -T app alembic upgrade head

            TABLES=$(docker compose exec -T db \
              psql -U postgres -d uni_db -tAc \
              "SELECT COUNT(*) FROM information_schema.tables \
               WHERE table_schema='public' AND table_type='BASE TABLE';")
 
            if [ "$TABLES" -gt 0 ]; then
              EVENTS=$(docker compose exec -T db \
                psql -U postgres -d uni_db -tAc \
                "SELECT COUNT(*) FROM events;" 2>/dev/null || echo "0")
 
              if [ "$EVENTS" -eq 0 ]; then
                echo "DB is empty — running seed..."
                docker compose exec -T db \
                  psql -U postgres -d uni_db < "$APP_DIR/seed.sql"
                echo "Seed complete"
              else
                echo "DB already has data — skipping seed"
              fi
            fi

            docker image prune -f

          ENDSSH